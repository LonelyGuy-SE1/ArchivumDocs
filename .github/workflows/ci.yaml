name: ArchivumDocs CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Enforce Clang-Format
        uses: jidicula/clang-format-action@v4.11.0
        with:
          clang-format-version: '15'
          check-path: '.'
          fallback-style: 'Google'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential pkg-config libssl-dev

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build Engine (Max Cores)
        run: cmake --build build --config Release -j$(nproc)

      - name: Run Tests
        run: ctest --test-dir build --output-on-failure

      - name: Execute Dry Run
        run: ./build/archivum
      
      - name: Execute Engine (Shadow Mode)
        run: |
          echo "[CI System] Interrogating GitHub Payload..."
          
          BASE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"
          
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]; then
            echo "[CI System] Void SHA detected. Overriding to local Git history."
            BASE_SHA=$(git rev-parse HEAD~1 || echo "")
          fi
          
          echo "Base Target: $BASE_SHA"
          echo "Head Target: $HEAD_SHA"
          
          ./build/archivum "${BASE_SHA:-FIRST_COMMIT}" "$HEAD_SHA"
