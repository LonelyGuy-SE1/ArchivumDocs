name: ArchivumDocs CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Enforce Clang-Format
        uses: jidicula/clang-format-action@v4.11.0
        with:
          clang-format-version: '15'
          check-path: 'src'
          fallback-style: 'Google'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential pkg-config libssl-dev

      - name: Configure CMake
        run: cmake -B build -S .

      - name: Build Engine (Max Cores)
        run: cmake --build build --config Release -j$(nproc)

      - name: Execute Dry Run
        run: ./build/archivum
      
      - name: Execute Engine (Shadow Mode)
        run: |
          echo "[CI System] Extracting SHAs for Shadow Mode execution..."
          
          BASE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"
          
          echo "Base Payload: $BASE_SHA"
          echo "Head Payload: $HEAD_SHA"
           
          ./build/archivum "$BASE_SHA" "$HEAD_SHA"