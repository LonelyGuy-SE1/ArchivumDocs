name: ArchivumDocs

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  document:
    runs-on: ubuntu-latest
    environment: documentation
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for git history analysis

      - name: Run ArchivumDocs
        uses: ./ # Use the action in this repo
        with:
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          model: ${{ secrets.ARCHIVUM_MODEL }}
          mode: pull_request

